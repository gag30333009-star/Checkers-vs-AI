<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Russian Checkers</title>

<style>
body{
  margin:0;
  background:#0a2540;
  font-family:Arial;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h1{
  margin:15px;
}

#board{
  display:grid;
  grid-template-columns:repeat(8,80px);
  grid-template-rows:repeat(8,80px);
  border:6px solid #5a3415;
}

.cell{
  width:80px;
  height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.light{ background:#e6cf9f; }
.dark{ background:#5a3415; }

.piece{
  width:60px;
  height:60px;
  border-radius:50%;
}

.white{
  background:#f7f2df;
  border:3px solid #c7b28a;
}

.black{
  background:#1c120b;
  border:3px solid #5a3a20;
}

.selected{
  outline:4px solid gold;
}

.valid::after{
  content:"";
  width:18px;
  height:18px;
  border-radius:50%;
  background:#4fc3ff;
  position:absolute;
}

.king::before{
  content:"♛";
  position:absolute;
  color:gold;
  font-size:28px;
}
</style>
</head>

<body>

<h1>RUSSIAN CHECKERS</h1>

<div id="board"></div>

<script>

let board=[];
let selected=null;
let turn="white";
let playerCapturing=false;

function inside(r,c){
  return r>=0&&r<8&&c>=0&&c<8;
}

function init(){
  board = Array(8).fill().map(()=>Array(8).fill(null));

  for(let r=0;r<3;r++){
    for(let c=0;c<8;c++){
      if((r+c)%2===1)
        board[r][c]={color:"black",king:false};
    }
  }

  for(let r=5;r<8;r++){
    for(let c=0;c<8;c++){
      if((r+c)%2===1)
        board[r][c]={color:"white",king:false};
    }
  }

  render();
}

/* ================= CAPTURE ================= */

function getCaptures(b,r,c){

  const p=b[r][c];
  if(!p) return [];

  const dirs=[[1,1],[1,-1],[-1,1],[-1,-1]];
  let caps=[];

  if(!p.king){

    for(const [dr,dc] of dirs){

      const mr=r+dr,mc=c+dc;
      const lr=r+dr*2,lc=c+dc*2;

      if(
        inside(lr,lc) &&
        b[mr] && b[mr][mc] &&
        b[mr][mc].color!==p.color &&
        !b[lr][lc]
      ){
        caps.push({r:lr,c:lc,jr:mr,jc:mc});
      }
    }

  }else{

    for(const [dr,dc] of dirs){

      let enemy=null;

      for(let i=1;i<8;i++){

        const nr=r+dr*i,nc=c+dc*i;

        if(!inside(nr,nc)) break;

        if(b[nr][nc]){

          if(b[nr][nc].color===p.color) break;
          if(enemy) break;

          enemy={r:nr,c:nc};
        }
        else if(enemy){

          caps.push({
            r:nr,c:nc,
            jr:enemy.r,jc:enemy.c
          });
        }
      }
    }
  }

  return caps;
}

function hasCapture(color){

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){

      const p=board[r][c];

      if(p&&p.color===color){

        if(getCaptures(board,r,c).length>0)
          return true;
      }
    }
  }
  return false;
}

/* ================= MOVES ================= */

function getMoves(b,r,c){

  const p=b[r][c];
  if(!p) return [];

  const caps=getCaptures(b,r,c);

  if(hasCapture(p.color))
    return caps;

  let moves=[];
  const dirs=p.king
    ? [[1,1],[1,-1],[-1,1],[-1,-1]]
    : (p.color==="white"
        ? [[-1,-1],[-1,1]]
        : [[1,-1],[1,1]]);

  for(const [dr,dc] of dirs){

    const nr=r+dr,nc=c+dc;

    if(inside(nr,nc)&&!b[nr][nc]){
      moves.push({r:nr,c:nc});
    }
  }

  return moves;
}

/* ================= MOVE ================= */

function move(fr,fc,tr,tc){

  const p=board[fr][fc];

  const m=getMoves(board,fr,fc)
    .find(x=>x.r===tr&&x.c===tc);

  if(!m) return;

  board[tr][tc]=p;
  board[fr][fc]=null;

  let captured=false;

  if(m.jr!==undefined){
    board[m.jr][m.jc]=null;
    captured=true;
  }

  if(p.color==="white"&&tr===0) p.king=true;
  if(p.color==="black"&&tr===7) p.king=true;

  if(captured){

    const more=getCaptures(board,tr,tc);

    if(more.length>0){

      selected={r:tr,c:tc};
      playerCapturing=true;
      render();
      return;
    }
  }

  selected=null;
  playerCapturing=false;

  turn=turn==="white"?"black":"white";

  render();
}

/* ================= CLICK ================= */

function clickCell(r,c){

  const p=board[r][c];

  if(selected){

    const moves=getMoves(board,selected.r,selected.c);

    const ok=moves.find(m=>m.r===r&&m.c===c);

    if(ok){
      move(selected.r,selected.c,r,c);
      return;
    }
  }

  if(p&&p.color===turn){

    if(hasCapture(turn)&&getCaptures(board,r,c).length===0)
      return;

    selected={r,c};
    render();
  }
}

/* ================= RENDER ================= */

function render(){

  const el=document.getElementById("board");
  el.innerHTML="";

  let valid=[];

  if(selected){
    valid=getMoves(board,selected.r,selected.c);
  }

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){

      const cell=document.createElement("div");
      cell.className="cell "+((r+c)%2?"dark":"light");

      if(selected&&selected.r===r&&selected.c===c)
        cell.classList.add("selected");

      if(valid.some(m=>m.r===r&&m.c===c))
        cell.classList.add("valid");

      cell.onclick=()=>clickCell(r,c);

      const p=board[r][c];

      if(p){

        const d=document.createElement("div");
        d.className="piece "+p.color+(p.king?" king":"");
        cell.appendChild(d);
      }

      el.appendChild(cell);
    }
  }
}

init();

</script>

</body>
</html>
