<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkers vs AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a1a1a;font-family:sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem;color:#fff;}
h1{font-size:32px;margin-bottom:0.5rem;color:#EF9F27;letter-spacing:2px;}
.info{font-size:14px;color:#888;margin-bottom:1.5rem;letter-spacing:1px;}
.status{font-size:16px;color:#EF9F27;margin-bottom:1rem;min-height:24px;}
#board{display:grid;grid-template-columns:repeat(8,60px);grid-template-rows:repeat(8,60px);border:3px solid #EF9F27;box-shadow:0 0 30px rgba(239,159,39,0.3);}
.cell{width:60px;height:60px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.light{background:#d4a574;}
.dark{background:#4a3520;}
.selected{box-shadow:inset 0 0 0 3px #EF9F27;}
.valid{box-shadow:inset 0 0 0 3px #4ade80;}
.piece{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;}
.red{background:radial-gradient(circle at 30% 30%,#ff6b6b,#c92a2a);color:#fff;box-shadow:0 4px 8px rgba(0,0,0,0.4);}
.black{background:radial-gradient(circle at 30% 30%,#444,#111);color:#fff;box-shadow:0 4px 8px rgba(0,0,0,0.4);}
.king::after{content:"♔";position:absolute;font-size:16px;}
.controls{margin-top:1.5rem;display:flex;gap:12px;}
button{background:#EF9F27;color:#1a1a1a;border:none;padding:10px 24px;font-size:13px;letter-spacing:2px;text-transform:uppercase;border-radius:4px;cursor:pointer;font-weight:600;}
button:hover{background:#ffb84d;}
.score{display:flex;gap:2rem;margin-bottom:1rem;font-size:14px;}
.score span{color:#EF9F27;font-weight:bold;font-size:18px;}
</style>
</head>
<body>
<h1>CHECKERS vs AI</h1>
<div class="info">You are RED · Click your piece, then click destination</div>
<div class="score">You: <span id="redScore">12</span> · AI: <span id="blackScore">12</span></div>
<div class="status" id="status">Your turn</div>
<div id="board"></div>
<div class="controls">
<button onclick="newGame()">New Game</button>
</div>
<script>
let board=[],selected=null,turn="red";
function newGame(){
  board=Array(8).fill().map(()=>Array(8).fill(null));
  for(let r=0;r<3;r++)for(let c=0;c<8;c++)if((r+c)%2===1)board[r][c]={color:"black",king:false};
  for(let r=5;r<8;r++)for(let c=0;c<8;c++)if((r+c)%2===1)board[r][c]={color:"red",king:false};
  selected=null;turn="red";
  document.getElementById("status").textContent="Your turn";
  render();
}
function render(){
  const b=document.getElementById("board");b.innerHTML="";
  let red=0,black=0;
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){
    const cell=document.createElement("div");
    cell.className="cell "+((r+c)%2===0?"light":"dark");
    cell.onclick=()=>click(r,c);
    if(selected&&selected.r===r&&selected.c===c)cell.classList.add("selected");
    if(selected){const moves=getMoves(selected.r,selected.c);if(moves.some(m=>m.r===r&&m.c===c))cell.classList.add("valid");}
    if(board[r][c]){
      const p=document.createElement("div");
      p.className="piece "+board[r][c].color+(board[r][c].king?" king":"");
      cell.appendChild(p);
      if(board[r][c].color==="red")red++;else black++;
    }
    b.appendChild(cell);
  }
  document.getElementById("redScore").textContent=red;
  document.getElementById("blackScore").textContent=black;
  if(red===0){document.getElementById("status").textContent="AI WINS! 🤖";return;}
  if(black===0){document.getElementById("status").textContent="YOU WIN! 🎉";return;}
}
function getMoves(r,c){
  const p=board[r][c];if(!p)return[];
  const moves=[],dirs=p.king?[[1,1],[1,-1],[-1,1],[-1,-1]]:p.color==="red"?[[-1,-1],[-1,1]]:[[1,-1],[1,1]];
  for(const[dr,dc]of dirs){
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<8&&nc>=0&&nc<8&&!board[nr][nc])moves.push({r:nr,c:nc,jump:false});
    const jr=r+dr*2,jc=c+dc*2;
    if(jr>=0&&jr<8&&jc>=0&&jc<8&&!board[jr][jc]&&board[nr]&&board[nr][nc]&&board[nr][nc].color!==p.color)moves.push({r:jr,c:jc,jump:true,jr:nr,jc:nc});
  }
  return moves;
}
function click(r,c){
  if(turn!=="red")return;
  if(selected){
    const moves=getMoves(selected.r,selected.c);
    const move=moves.find(m=>m.r===r&&m.c===c);
    if(move){
      board[r][c]=board[selected.r][selected.c];
      board[selected.r][selected.c]=null;
      if(move.jump)board[move.jr][move.jc]=null;
      if(r===0)board[r][c].king=true;
      selected=null;turn="black";
      document.getElementById("status").textContent="AI thinking...";
      render();
      setTimeout(aiMove,800);
      return;
    }
    selected=null;
  }
  if(board[r][c]&&board[r][c].color==="red")selected={r,c};
  render();
}
function aiMove(){
  const allMoves=[];
  for(let r=0;r<8;r++)for(let c=0;c<8;c++)if(board[r][c]&&board[r][c].color==="black"){
    const moves=getMoves(r,c);
    for(const m of moves)allMoves.push({from:{r,c},to:m});
  }
  if(allMoves.length===0){document.getElementById("status").textContent="YOU WIN! 🎉";return;}
  const jumps=allMoves.filter(m=>m.to.jump);
  const pick=jumps.length>0?jumps[Math.floor(Math.random()*jumps.length)]:allMoves[Math.floor(Math.random()*allMoves.length)];
  board[pick.to.r][pick.to.c]=board[pick.from.r][pick.from.c];
  board[pick.from.r][pick.from.c]=null;
  if(pick.to.jump)board[pick.to.jr][pick.to.jc]=null;
  if(pick.to.r===7)board[pick.to.r][pick.to.c].king=true;
  turn="red";
  document.getElementById("status").textContent="Your turn";
  render();
}
newGame();
</script>
</body>
</html>
