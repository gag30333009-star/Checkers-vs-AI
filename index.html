<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Russian Checkers vs AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--cell:min(11vw,64px);--piece:calc(var(--cell) * 0.78);--ocean:#0a2540;--ocean-deep:#051628;--cream:#f5e6c8;--cream-soft:#e8d4a8;--brown:#6b4423;--brown-dark:#3d2817;--brown-light:#8b5a2b;--gold:#d4a574;--accent:#7eb3d3;}
body{background:linear-gradient(135deg,var(--ocean-deep),var(--ocean) 50%,#0d3050);font-family:Georgia,serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1rem;color:var(--cream);touch-action:manipulation;}
h1{font-size:clamp(22px,5.5vw,36px);margin-bottom:0.3rem;color:var(--cream);letter-spacing:3px;text-shadow:0 2px 12px rgba(245,230,200,0.3),0 0 30px rgba(212,165,116,0.4);text-align:center;}
.info{font-size:clamp(10px,2.5vw,13px);color:var(--cream-soft);opacity:0.7;margin-bottom:1rem;letter-spacing:1px;text-align:center;padding:0 1rem;}
.status{font-size:clamp(14px,3.5vw,16px);color:var(--gold);margin-bottom:1rem;min-height:24px;font-weight:600;text-align:center;padding:0 1rem;text-shadow:0 2px 8px rgba(212,165,116,0.4);}
.screen{display:flex;flex-direction:column;align-items:center;gap:1.2rem;padding:1rem;width:100%;max-width:600px;}
.screen h2{font-size:clamp(16px,4vw,22px);color:var(--cream);letter-spacing:2px;text-align:center;}
.btns{display:flex;gap:0.7rem;flex-wrap:wrap;justify-content:center;width:100%;}
.opt-btn{padding:14px 22px;font-size:clamp(11px,2.5vw,13px);letter-spacing:1.5px;text-transform:uppercase;border:2px solid var(--gold);background:rgba(245,230,200,0.05);color:var(--cream);cursor:pointer;border-radius:6px;font-weight:600;min-width:130px;flex:1 1 auto;max-width:200px;font-family:Georgia,serif;transition:all 0.3s;}
.opt-btn:hover{background:var(--gold);color:var(--brown-dark);box-shadow:0 4px 20px rgba(212,165,116,0.5);transform:translateY(-2px);}
.opt-btn.white-c{border-color:var(--cream);}
.opt-btn.white-c:hover{background:var(--cream);color:var(--brown-dark);}
.opt-btn.black-c{border-color:var(--brown-light);}
.opt-btn.black-c:hover{background:var(--brown);color:var(--cream);}
.opt-btn.green{border-color:#7dd87d;}
.opt-btn.green:hover{background:#7dd87d;color:var(--ocean-deep);}
.opt-btn.yellow{border-color:#f0c674;}
.opt-btn.yellow:hover{background:#f0c674;color:var(--ocean-deep);}
.opt-btn.orange{border-color:#e8985c;}
.opt-btn.orange:hover{background:#e8985c;color:var(--ocean-deep);}
.opt-btn.purple{border-color:#b89cd8;}
.opt-btn.purple:hover{background:#b89cd8;color:var(--ocean-deep);}
.board-wrap{padding:clamp(10px,2vw,22px);background:linear-gradient(135deg,var(--brown-dark),var(--brown));border-radius:10px;box-shadow:0 25px 70px rgba(0,0,0,0.7),inset 0 2px 0 rgba(245,230,200,0.1),0 0 60px rgba(10,37,64,0.5);border:2px solid var(--brown-light);position:relative;}
#board{display:grid;grid-template-columns:repeat(8,var(--cell));grid-template-rows:repeat(8,var(--cell));border:2px solid var(--brown-dark);box-shadow:inset 0 0 30px rgba(0,0,0,0.6);position:relative;}
.cell{width:var(--cell);height:var(--cell);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:background 0.2s;}
.light-sq{background:linear-gradient(135deg,#e8d4a8,#c9a575);box-shadow:inset 0 0 8px rgba(0,0,0,0.15);}
.dark-sq{background:linear-gradient(135deg,#5a3d20,#3d2817);box-shadow:inset 0 0 8px rgba(0,0,0,0.5);}
.selected{box-shadow:inset 0 0 0 4px var(--gold),inset 0 0 25px rgba(212,165,116,0.5);}
.valid::before{content:"";width:25%;height:25%;background:radial-gradient(circle,var(--accent),#4a8db5);border-radius:50%;opacity:0.8;position:absolute;box-shadow:0 0 14px var(--accent);animation:pulse-blue 1.5s infinite;}
@keyframes pulse-blue{0%,100%{opacity:0.6;transform:scale(0.9);}50%{opacity:1;transform:scale(1.15);}}
.victim{animation:pulse-red 0.8s infinite;}
@keyframes pulse-red{0%,100%{box-shadow:inset 0 0 0 4px #d4615a,inset 0 0 20px rgba(212,97,90,0.4);}50%{box-shadow:inset 0 0 0 4px #e87a72,inset 0 0 35px rgba(212,97,90,0.8),0 0 22px #d4615a;}}
.can-capture{animation:pulse-gold 1.3s infinite;}
@keyframes pulse-gold{0%,100%{box-shadow:inset 0 0 0 3px var(--gold),inset 0 0 15px rgba(212,165,116,0.3);}50%{box-shadow:inset 0 0 0 3px #e6c08a,inset 0 0 28px rgba(212,165,116,0.7),0 0 20px var(--gold);}}
.piece{width:var(--piece);height:var(--piece);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);position:relative;z-index:5;}
.white-p{background:radial-gradient(circle at 32% 28%,#fffef5 0%,#f5e6c8 25%,#e0c896 55%,#b89968 85%,#8b6f47 100%);box-shadow:0 8px 16px rgba(0,0,0,0.7),inset 0 -6px 12px rgba(139,111,71,0.4),inset 0 3px 6px rgba(255,255,255,0.6),0 2px 4px rgba(0,0,0,0.3);border:2px solid #8b6f47;}
.white-p::before{content:"";position:absolute;top:12%;left:22%;width:25%;height:18%;background:radial-gradient(ellipse,rgba(255,255,255,0.95),transparent 70%);border-radius:50%;filter:blur(1px);}
.white-p::after{content:"";position:absolute;width:65%;height:65%;border-radius:50%;border:2px solid rgba(139,111,71,0.4);box-shadow:inset 0 0 10px rgba(139,111,71,0.3),inset 0 4px 6px rgba(255,255,255,0.2);}
.black-p{background:radial-gradient(circle at 32% 28%,#7a5530 0%,#4a2f15 30%,#2a1808 65%,#150c04 90%,#000 100%);box-shadow:0 8px 16px rgba(0,0,0,0.8),inset 0 -6px 12px rgba(0,0,0,0.6),inset 0 3px 6px rgba(139,111,71,0.3),0 2px 4px rgba(0,0,0,0.4);border:2px solid #0d0700;}
.black-p::before{content:"";position:absolute;top:12%;left:22%;width:25%;height:18%;background:radial-gradient(ellipse,rgba(212,165,116,0.45),transparent 70%);border-radius:50%;filter:blur(1px);}
.black-p::after{content:"";position:absolute;width:65%;height:65%;border-radius:50%;border:2px solid rgba(139,111,71,0.2);box-shadow:inset 0 0 10px rgba(0,0,0,0.6),inset 0 4px 6px rgba(139,111,71,0.15);}
.king{position:relative;}
.king>span.crown{position:absolute;color:var(--gold);font-size:calc(var(--piece) * 0.52);text-shadow:0 0 10px rgba(212,165,116,0.9),0 2px 4px rgba(0,0,0,0.7);z-index:10;animation:crown-glow 2s infinite;}
@keyframes crown-glow{0%,100%{text-shadow:0 0 10px rgba(212,165,116,0.9),0 2px 4px rgba(0,0,0,0.7);}50%{text-shadow:0 0 20px rgba(212,165,116,1),0 0 30px rgba(212,165,116,0.7),0 2px 4px rgba(0,0,0,0.7);}}
.moving{z-index:100;box-shadow:0 16px 30px rgba(212,165,116,0.6),0 8px 16px rgba(0,0,0,0.6);}
.controls{margin-top:1.2rem;display:flex;gap:12px;}
button{background:linear-gradient(135deg,var(--gold),#b8895a);color:var(--ocean-deep);border:none;padding:12px 24px;font-size:clamp(11px,2.5vw,13px);letter-spacing:2px;text-transform:uppercase;border-radius:6px;cursor:pointer;font-weight:600;box-shadow:0 6px 14px rgba(0,0,0,0.5);font-family:Georgia,serif;}
button:hover{background:linear-gradient(135deg,#e6c08a,var(--gold));transform:translateY(-2px);}
.score{display:flex;gap:2rem;margin-bottom:1rem;font-size:clamp(12px,3vw,14px);text-align:center;color:var(--cream-soft);}
.score span{color:var(--gold);font-weight:bold;font-size:clamp(16px,4vw,20px);text-shadow:0 0 8px rgba(212,165,116,0.4);}
.level-tag{font-size:clamp(9px,2.2vw,11px);color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:0.5rem;text-align:center;}
.hide{display:none;}
</style>
</head>
<body>
<h1>RUSSIAN CHECKERS</h1>
<div class="info">Russian rules · Captures backward · Kings move long · Captures mandatory · Draw after 15 moves no capture</div>
<div id="levelScreen" class="screen">
<h2>Choose Difficulty</h2>
<div class="btns">
<button class="opt-btn green" onclick="chooseLevel('beginner')">🟢 Beginner</button>
<button class="opt-btn yellow" onclick="chooseLevel('normal')">🟡 Normal</button>
<button class="opt-btn orange" onclick="chooseLevel('hard')">🟠 Hard</button>
<button class="opt-btn purple" onclick="chooseLevel('impossible')">🔴 Impossible</button>
</div>
</div>
<div id="colorScreen" class="screen hide">
<h2>Choose Your Color</h2>
<div class="btns">
<button class="opt-btn white-c" onclick="start('white')">Play as WHITE</button>
<button class="opt-btn black-c" onclick="start('black')">Play as BLACK</button>
</div>
</div>
<div id="gameScreen" class="hide">
<div class="level-tag" id="levelTag">Normal</div>
<div class="score">You: <span id="myScore">12</span> · AI: <span id="aiScore">12</span></div>
<div class="status" id="status">Your turn</div>
<div class="board-wrap"><div id="board"></div></div>
<div class="controls">
<button onclick="restart()">New Game</button>
</div>
</div>
<script>
let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playTone(freq,duration,type,volume){
  if(!audioCtx)return;
  const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();
  osc.type=type||"sine";osc.frequency.value=freq;
  gain.gain.setValueAtTime(volume||0.3,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+duration);
  osc.connect(gain);gain.connect(audioCtx.destination);
  osc.start();osc.stop(audioCtx.currentTime+duration);
}
function soundMove(){initAudio();playTone(400,0.1,"square",0.15);}
function soundCapture(){initAudio();playTone(150,0.15,"sawtooth",0.3);setTimeout(()=>playTone(80,0.2,"sawtooth",0.4),80);}
function soundWin(){initAudio();const n=[523,659,784,1047];n.forEach((f,i)=>setTimeout(()=>playTone(f,0.3,"triangle",0.3),i*150));}
function soundLose(){initAudio();const n=[440,392,349,294];n.forEach((f,i)=>setTimeout(()=>playTone(f,0.4,"sine",0.3),i*200));}
function soundKing(){initAudio();playTone(800,0.15,"triangle",0.3);setTimeout(()=>playTone(1200,0.2,"triangle",0.3),100);}
function soundDraw(){initAudio();playTone(440,0.4,"sine",0.3);setTimeout(()=>playTone(440,0.4,"sine",0.3),450);}

// "white" is always TOP, "black" is always BOTTOM in the array.
// playerColor pieces move toward row 0 (up), aiColor pieces move toward row 7 (down) — handled by direction logic.
let board=[],selected=null,turn=null,playerColor="white",aiColor="black",difficulty="normal",aiBusy=false,gameEnded=false,playerBusy=false,movesWithoutCapture=0;
const DEPTH={beginner:1,normal:2,hard:5,impossible:7};

function chooseLevel(lvl){difficulty=lvl;document.getElementById("levelScreen").classList.add("hide");document.getElementById("colorScreen").classList.remove("hide");}
function restart(){gameEnded=false;document.getElementById("gameScreen").classList.add("hide");document.getElementById("levelScreen").classList.remove("hide");}

function start(color){
  initAudio();
  playerColor=color;aiColor=color==="white"?"black":"white";
  document.getElementById("colorScreen").classList.add("hide");
  document.getElementById("gameScreen").classList.remove("hide");
  document.getElementById("levelTag").textContent=difficulty.toUpperCase();
  newGame();
}

function endGame(text,result){
  if(gameEnded)return;
  gameEnded=true;
  document.getElementById("status").textContent=text;
  if(result==="win")soundWin();
  else if(result==="lose")soundLose();
  else soundDraw();
}

function newGame(){
  board=Array(8).fill().map(()=>Array(8).fill(null));
  // player pieces always at bottom (rows 5-7), AI at top (rows 0-2)
  for(let r=0;r<3;r++)for(let c=0;c<8;c++)if((r+c)%2===1)board[r][c]={color:aiColor,king:false};
  for(let r=5;r<8;r++)for(let c=0;c<8;c++)if((r+c)%2===1)board[r][c]={color:playerColor,king:false};
  selected=null;turn=playerColor;aiBusy=false;gameEnded=false;playerBusy=false;movesWithoutCapture=0;
  document.getElementById("status").textContent="Your turn";
  render();
}

// ---- Direction: a color moves "up" (-1) if it's the player, "down" (+1) if it's the AI ----
function forwardDir(color){
  return color===playerColor?-1:1;
}
function promotionRow(color){
  // player promotes at row 0 (top), AI promotes at row 7 (bottom)
  return color===playerColor?0:7;
}

function cloneBoard(b){return b.map(row=>row.map(c=>c?{...c}:null));}

// ---- Single-step captures from a square ----
function getCaptures(b,r,c){
  const p=b[r][c];if(!p)return[];
  const captures=[];const dirs=[[1,1],[1,-1],[-1,1],[-1,-1]];
  if(p.king){
    for(const[dr,dc]of dirs){
      let enemy=null;
      for(let i=1;i<8;i++){
        const nr=r+dr*i,nc=c+dc*i;
        if(nr<0||nr>=8||nc<0||nc>=8)break;
        if(b[nr][nc]){
          if(b[nr][nc].color===p.color)break;
          if(enemy)break;
          enemy={r:nr,c:nc};
        }else if(enemy){
          captures.push({r:nr,c:nc,jr:enemy.r,jc:enemy.c});
        }
      }
    }
  }else{
    for(const[dr,dc]of dirs){
      const nr=r+dr,nc=c+dc,jr=r+dr*2,jc=c+dc*2;
      if(jr>=0&&jr<8&&jc>=0&&jc<8&&!b[jr][jc]&&b[nr]&&b[nr][nc]&&b[nr][nc].color!==p.color){
        captures.push({r:jr,c:jc,jr:nr,jc:nc});
      }
    }
  }
  return captures;
}

// ---- Simple (non-capture) moves ----
function getSimpleMoves(b,r,c){
  const p=b[r][c];if(!p)return[];
  const moves=[];
  if(p.king){
    const dirs=[[1,1],[1,-1],[-1,1],[-1,-1]];
    for(const[dr,dc]of dirs){
      for(let i=1;i<8;i++){
        const nr=r+dr*i,nc=c+dc*i;
        if(nr<0||nr>=8||nc<0||nc>=8)break;
        if(b[nr][nc])break;
        moves.push({r:nr,c:nc});
      }
    }
  }else{
    const fd=forwardDir(p.color);
    for(const dc of [-1,1]){
      const nr=r+fd,nc=c+dc;
      if(nr>=0&&nr<8&&nc>=0&&nc<8&&!b[nr][nc])moves.push({r:nr,c:nc});
    }
  }
  return moves;
}

// ---- Find ALL full capture chains starting at (r,c). Returns array of sequences. ----
// Each sequence is a list of steps: {r,c,jr,jc}
function findChains(b,r,c){
  const caps=getCaptures(b,r,c);
  if(caps.length===0)return [];
  const chains=[];
  for(const cap of caps){
    const nb=cloneBoard(b);
    // move piece, remove captured
    nb[cap.r][cap.c]=nb[r][c];
    nb[r][c]=null;
    nb[cap.jr][cap.jc]=null;
    // promote mid-chain if reaches promotion row (Russian: becomes king and continues as king)
    const piece=nb[cap.r][cap.c];
    if(!piece.king&&cap.r===promotionRow(piece.color))piece.king=true;
    const further=findChains(nb,cap.r,cap.c);
    if(further.length===0){
      chains.push([cap]);
    }else{
      for(const f of further)chains.push([cap,...f]);
    }
  }
  return chains;
}

function colorHasCapture(b,color){
  for(let r=0;r<8;r++)for(let c=0;c<8;c++)
    if(b[r][c]&&b[r][c].color===color&&getCaptures(b,r,c).length>0)return true;
  return false;
}

function getAllMoves(b,color){
  const mustCap=colorHasCapture(b,color);
  const all=[];
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){
    if(b[r][c]&&b[r][c].color===color){
      if(mustCap){
        const chains=findChains(b,r,c);
        for(const ch of chains)all.push({from:{r,c},chain:ch,isCapture:true});
      }else{
        const moves=getSimpleMoves(b,r,c);
        for(const m of moves)all.push({from:{r,c},to:m,isCapture:false});
      }
    }
  }
  return all;
}

// ---- Render ----
function render(){
  const b=document.getElementById("board");b.innerHTML="";
  let myCount=0,aiCount=0;
  const mustCap=colorHasCapture(board,playerColor);
  let validDests=new Set();
  let victims=new Set();
  let canCaptureCells=new Set();

  if(mustCap&&turn===playerColor&&!selected){
    for(let r=0;r<8;r++)for(let c=0;c<8;c++)
      if(board[r][c]&&board[r][c].color===playerColor&&getCaptures(board,r,c).length>0)
        canCaptureCells.add(r+","+c);
  }

  if(selected){
    if(mustCap){
      const chains=findChains(board,selected.r,selected.c);
      for(const ch of chains){
        if(ch.length>0){
          const last=ch[ch.length-1];
          validDests.add(last.r+","+last.c);
          for(const step of ch)victims.add(step.jr+","+step.jc);
        }
      }
    }else{
      const moves=getSimpleMoves(board,selected.r,selected.c);
      for(const m of moves)validDests.add(m.r+","+m.c);
    }
  }

  for(let r=0;r<8;r++)for(let c=0;c<8;c++){
    const cell=document.createElement("div");
    cell.className="cell "+((r+c)%2===0?"light-sq":"dark-sq");
    cell.onclick=()=>click(r,c);
    cell.dataset.r=r;cell.dataset.c=c;
    if(selected&&selected.r===r&&selected.c===c)cell.classList.add("selected");
    if(validDests.has(r+","+c))cell.classList.add("valid");
    if(victims.has(r+","+c))cell.classList.add("victim");
    if(canCaptureCells.has(r+","+c)&&!selected)cell.classList.add("can-capture");
    if(board[r][c]){
      const p=document.createElement("div");
      p.className="piece "+(board[r][c].color==="white"?"white-p":"black-p")+(board[r][c].king?" king":"");
      p.dataset.r=r;p.dataset.c=c;
      if(board[r][c].king){
        const crown=document.createElement("span");
        crown.className="crown";crown.textContent="♛";
        p.appendChild(crown);
      }
      cell.appendChild(p);
      if(board[r][c].color===playerColor)myCount++;else aiCount++;
    }
    b.appendChild(cell);
  }
  document.getElementById("myScore").textContent=myCount;
  document.getElementById("aiScore").textContent=aiCount;

  if(gameEnded)return;
  const myName=playerColor==="white"?"WHITE":"BLACK";
  const aiName=aiColor==="white"?"WHITE":"BLACK";
  if(myCount===0){endGame(aiName+" WINS! 🤖","lose");return;}
  if(aiCount===0){endGame(myName+" WINS! 🎉","win");return;}
  if(turn===playerColor&&!aiBusy&&!playerBusy){
    if(getAllMoves(board,playerColor).length===0){endGame(aiName+" WINS! 🏆 (No moves available)","lose");return;}
  }
  if(turn===aiColor&&!aiBusy){
    if(getAllMoves(board,aiColor).length===0){endGame(myName+" WINS! 🏆 (No moves available)","win");return;}
  }
}

// ---- Animation ----
function animateMove(fromR,fromC,toR,toC,callback){
  const cells=document.querySelectorAll(".cell");
  let fromCell=null,toCell=null;
  for(const cell of cells){
    if(+cell.dataset.r===fromR&&+cell.dataset.c===fromC)fromCell=cell;
    if(+cell.dataset.r===toR&&+cell.dataset.c===toC)toCell=cell;
  }
  if(!fromCell||!toCell){callback();return;}
  const piece=fromCell.querySelector(".piece");
  if(!piece){callback();return;}
  fromCell.classList.add("selected");
  const fr=fromCell.getBoundingClientRect();
  const tr=toCell.getBoundingClientRect();
  piece.classList.add("moving");
  setTimeout(()=>{
    piece.style.transform=`translate(${tr.left-fr.left}px,${tr.top-fr.top}px)`;
    setTimeout(callback,420);
  },40);
}

// ---- Execute a full capture chain step by step (works for player AND ai) ----
async function executeChain(fromR,fromC,chain){
  let curR=fromR,curC=fromC;
  for(const step of chain){
    await new Promise(resolve=>{
      animateMove(curR,curC,step.r,step.c,()=>{
        const piece=board[curR][curC];
        board[step.r][step.c]=piece;
        board[curR][curC]=null;
        board[step.jr][step.jc]=null;
        soundCapture();
        if(!piece.king&&step.r===promotionRow(piece.color)){piece.king=true;setTimeout(soundKing,150);}
        curR=step.r;curC=step.c;
        render();
        setTimeout(resolve,150);
      });
    });
  }
}

// ---- Player click ----
function click(r,c){
  if(turn!==playerColor||aiBusy||gameEnded||playerBusy)return;
  const mustCap=colorHasCapture(board,playerColor);

  if(selected){
    // capture mode
    if(mustCap){
      const chains=findChains(board,selected.r,selected.c);
      let chosen=null;
      for(const ch of chains){
        const last=ch[ch.length-1];
        if(last.r===r&&last.c===c){chosen=ch;break;}
      }
      if(chosen){
        playerBusy=true;
        const fr=selected.r,fc=selected.c;
        selected=null;
        executeChain(fr,fc,chosen).then(()=>{
          movesWithoutCapture=0;
          playerBusy=false;
          turn=aiColor;
          document.getElementById("status").textContent="AI thinking...";
          render();
          if(!gameEnded)setTimeout(aiTurn,500);
        });
        return;
      }
      // clicked elsewhere: maybe selecting another capturing piece
      if(board[r][c]&&board[r][c].color===playerColor&&getCaptures(board,r,c).length>0){
        selected={r,c};render();return;
      }
      selected=null;render();return;
    }
    // simple move mode
    const moves=getSimpleMoves(board,selected.r,selected.c);
    const move=moves.find(m=>m.r===r&&m.c===c);
    if(move){
      const piece=board[selected.r][selected.c];
      board[r][c]=piece;
      board[selected.r][selected.c]=null;
      soundMove();
      movesWithoutCapture++;
      if(!piece.king&&r===promotionRow(piece.color)){piece.king=true;setTimeout(soundKing,150);}
      selected=null;turn=aiColor;
      document.getElementById("status").textContent="AI thinking...";
      render();
      if(movesWithoutCapture>=30){endGame("DRAW! 🤝 (15 moves each without capture)","draw");return;}
      if(!gameEnded)setTimeout(aiTurn,500);
      return;
    }
    selected=null;
  }

  // select a piece
  if(board[r][c]&&board[r][c].color===playerColor){
    if(mustCap&&getCaptures(board,r,c).length===0){render();return;}
    selected={r,c};
  }
  render();
}

// ---- AI ----
function applyMoveSilent(b,move){
  const nb=cloneBoard(b);
  if(move.isCapture){
    let curR=move.from.r,curC=move.from.c;
    for(const step of move.chain){
      const piece=nb[curR][curC];
      nb[step.r][step.c]=piece;
      nb[curR][curC]=null;
      nb[step.jr][step.jc]=null;
      if(!piece.king&&step.r===promotionRow(piece.color))piece.king=true;
      curR=step.r;curC=step.c;
    }
  }else{
    const piece=nb[move.from.r][move.from.c];
    nb[move.to.r][move.to.c]=piece;
    nb[move.from.r][move.from.c]=null;
    if(!piece.king&&move.to.r===promotionRow(piece.color))piece.king=true;
  }
  return nb;
}

function evaluate(b){
  let aiP=0,plP=0,aiK=0,plK=0,aiAdv=0,plAdv=0,aiBack=0,plBack=0,aiCen=0,plCen=0;
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){
    const p=b[r][c];if(!p)continue;
    const isAi=p.color===aiColor;
    if(p.king){if(isAi)aiK++;else plK++;}
    else{
      if(isAi){aiP++;aiAdv+=r;if(r===0)aiBack++;}
      else{plP++;plAdv+=(7-r);if(r===7)plBack++;}
    }
    if(c>=2&&c<=5&&r>=2&&r<=5){if(isAi)aiCen++;else plCen++;}
  }
  let score=(aiP-plP)*100+(aiK-plK)*300+(aiAdv-plAdv)*2+(aiCen-plCen)*5+(aiBack-plBack)*4;
  if(aiP+aiK===0)score-=10000;
  if(plP+plK===0)score+=10000;
  return score;
}

function minimax(b,depth,isMax,alpha,beta){
  if(depth===0)return{score:evaluate(b)};
  const color=isMax?aiColor:playerColor;
  const moves=getAllMoves(b,color);
  if(moves.length===0)return{score:isMax?-10000:10000};
  moves.sort((a,b)=>(b.isCapture?1:0)-(a.isCapture?1:0));
  let best=isMax?-Infinity:Infinity,bestMove=moves[0];
  for(const move of moves){
    const res=minimax(applyMoveSilent(b,move),depth-1,!isMax,alpha,beta);
    if(isMax){if(res.score>best){best=res.score;bestMove=move;}alpha=Math.max(alpha,best);}
    else{if(res.score<best){best=res.score;bestMove=move;}beta=Math.min(beta,best);}
    if(beta<=alpha)break;
  }
  return{score:best,move:bestMove};
}

function highlightAiVictims(move){
  if(!move.isCapture)return;
  const cells=document.querySelectorAll(".cell");
  for(const step of move.chain){
    for(const cell of cells){
      if(+cell.dataset.r===step.jr&&+cell.dataset.c===step.jc)cell.classList.add("victim");
    }
  }
}

function aiTurn(){
  if(gameEnded)return;
  aiBusy=true;
  const moves=getAllMoves(board,aiColor);
  if(moves.length===0){
    const myName=playerColor==="white"?"WHITE":"BLACK";
    endGame(myName+" WINS! 🏆 (No moves available)","win");
    aiBusy=false;return;
  }
  let pick;
  if(difficulty==="beginner"){
    pick=moves[Math.floor(Math.random()*moves.length)];
  }else if(difficulty==="normal"){
    const caps=moves.filter(m=>m.isCapture);
    pick=caps.length>0?caps[Math.floor(Math.random()*caps.length)]:moves[Math.floor(Math.random()*moves.length)];
  }else{
    pick=minimax(board,DEPTH[difficulty],true,-Infinity,Infinity).move;
  }

  if(pick.isCapture){
    document.getElementById("status").textContent="AI is capturing...";
    highlightAiVictims(pick);
    setTimeout(()=>{
      executeChain(pick.from.r,pick.from.c,pick.chain).then(()=>{
        movesWithoutCapture=0;
        aiBusy=false;turn=playerColor;
        if(!gameEnded)document.getElementById("status").textContent="Your turn";
        render();
      });
    },1000);
  }else{
    document.getElementById("status").textContent="AI is moving...";
    setTimeout(()=>{
      animateMove(pick.from.r,pick.from.c,pick.to.r,pick.to.c,()=>{
        const piece=board[pick.from.r][pick.from.c];
        board[pick.to.r][pick.to.c]=piece;
        board[pick.from.r][pick.from.c]=null;
        soundMove();
        movesWithoutCapture++;
        if(!piece.king&&pick.to.r===promotionRow(piece.color)){piece.king=true;setTimeout(soundKing,150);}
        aiBusy=false;turn=playerColor;
        if(!gameEnded)document.getElementById("status").textContent="Your turn";
        render();
        if(movesWithoutCapture>=30)endGame("DRAW! 🤝 (15 moves each without capture)","draw");
      });
    },500);
  }
}
