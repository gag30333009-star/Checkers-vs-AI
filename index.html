<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Russian Checkers vs AI</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0a2540;
  color:white;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

h1{
  margin-bottom:20px;
}

#board{
  display:grid;
  grid-template-columns:repeat(8,70px);
  grid-template-rows:repeat(8,70px);
  border:5px solid #5a3d20;
}

.cell{
  width:70px;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.light{
  background:#e8d4a8;
}

.dark{
  background:#5a3d20;
}

.piece{
  width:55px;
  height:55px;
  border-radius:50%;
  cursor:pointer;
}

.white{
  background:#f5e6c8;
  border:3px solid #999;
}

.black{
  background:#1a1a1a;
  border:3px solid #555;
}

.selected{
  outline:4px solid gold;
}

.valid::after{
  content:"";
  width:18px;
  height:18px;
  border-radius:50%;
  background:#66ccff;
  position:absolute;
}

.king::before{
  content:"♛";
  position:absolute;
  color:gold;
  font-size:24px;
}

#status{
  margin:20px;
  font-size:22px;
}
</style>
</head>

<body>

<h1>RUSSIAN CHECKERS</h1>

<div id="status">Your turn</div>

<div id="board"></div>

<script>

let board = [];

let selected = null;

let turn = "white";

let playerCapturing = false;

function initBoard(){

  board = Array(8).fill().map(()=>Array(8).fill(null));

  for(let r=0;r<3;r++){

    for(let c=0;c<8;c++){

      if((r+c)%2===1){

        board[r][c] = {
          color:"black",
          king:false
        };

      }
    }
  }

  for(let r=5;r<8;r++){

    for(let c=0;c<8;c++){

      if((r+c)%2===1){

        board[r][c] = {
          color:"white",
          king:false
        };

      }
    }
  }

  render();
}

function render(){

  const boardEl = document.getElementById("board");

  boardEl.innerHTML = "";

  let validMoves = [];

  if(selected){

    validMoves = getMoves(
      selected.r,
      selected.c
    );
  }

  for(let r=0;r<8;r++){

    for(let c=0;c<8;c++){

      const cell = document.createElement("div");

      cell.className =
        "cell " +
        ((r+c)%2===0 ? "light":"dark");

      if(selected &&
         selected.r===r &&
         selected.c===c){

        cell.classList.add("selected");
      }

      if(validMoves.some(m=>m.r===r && m.c===c)){

        cell.classList.add("valid");
      }

      cell.onclick = ()=>clickCell(r,c);

      const piece = board[r][c];

      if(piece){

        const pieceEl = document.createElement("div");

        pieceEl.className =
          "piece " +
          piece.color;

        if(piece.king){

          pieceEl.classList.add("king");
        }

        cell.appendChild(pieceEl);
      }

      boardEl.appendChild(cell);
    }
  }
}

function inside(r,c){

  return r>=0 &&
         r<8 &&
         c>=0 &&
         c<8;
}

function getCaptures(r,c){

  const piece = board[r][c];

  if(!piece) return [];

  const dirs = [
    [1,1],
    [1,-1],
    [-1,1],
    [-1,-1]
  ];

  let captures = [];

  for(const [dr,dc] of dirs){

    const mr = r + dr;
    const mc = c + dc;

    const jr = r + dr*2;
    const jc = c + dc*2;

    if(
      inside(jr,jc) &&
      board[mr][mc] &&
      board[mr][mc].color !== piece.color &&
      !board[jr][jc]
    ){

      captures.push({
        r:jr,
        c:jc,
        jr:mr,
        jc:mc
      });
    }
  }

  return captures;
}

function hasCapture(color){

  for(let r=0;r<8;r++){

    for(let c=0;c<8;c++){

      const p = board[r][c];

      if(
        p &&
        p.color===color &&
        getCaptures(r,c).length>0
      ){

        return true;
      }
    }
  }

  return false;
}

function getMoves(r,c){

  const piece = board[r][c];

  if(!piece) return [];

  const captures = getCaptures(r,c);

  if(captures.length>0){

    return captures;
  }

  if(hasCapture(piece.color)){

    return [];
  }

  let dirs = [];

  if(piece.king){

    dirs = [
      [1,1],
      [1,-1],
      [-1,1],
      [-1,-1]
    ];

  }else{

    dirs =
      piece.color==="white"
      ? [[-1,-1],[-1,1]]
      : [[1,-1],[1,1]];
  }

  let moves = [];

  for(const [dr,dc] of dirs){

    const nr = r + dr;
    const nc = c + dc;

    if(
      inside(nr,nc) &&
      !board[nr][nc]
    ){

      moves.push({
        r:nr,
        c:nc
      });
    }
  }

  return moves;
}

function movePiece(fr,fc,tr,tc){

  const move = getMoves(fr,fc)
    .find(m=>m.r===tr && m.c===tc);

  if(!move) return;

  const piece = board[fr][fc];

  board[tr][tc] = piece;

  board[fr][fc] = null;

  let wasCapture = false;

  if(move.jr!==undefined){

    board[move.jr][move.jc] = null;

    wasCapture = true;
  }

  if(piece.color==="white" && tr===0){

    piece.king = true;
  }

  if(piece.color==="black" && tr===7){

    piece.king = true;
  }

  // MULTI CAPTURE FIX

  if(wasCapture){

    const more = getCaptures(tr,tc);

    if(more.length>0){

      selected = {
        r:tr,
        c:tc
      };

      playerCapturing = true;

      render();

      return;
    }
  }

  playerCapturing = false;

  selected = null;

  turn =
    turn==="white"
    ? "black"
    : "white";

  document.getElementById("status")
    .textContent =
    turn==="white"
    ? "White turn"
    : "Black turn";

  render();
}

function clickCell(r,c){

  const piece = board[r][c];

  if(selected){

    const moves = getMoves(
      selected.r,
      selected.c
    );

    const valid =
      moves.find(m=>m.r===r && m.c===c);

    if(valid){

      movePiece(
        selected.r,
        selected.c,
        r,
        c
      );

      return;
    }
  }

  if(
    piece &&
    piece.color===turn
  ){

    if(
      hasCapture(turn) &&
      getCaptures(r,c).length===0
    ){

      return;
    }

    selected = {
      r,
      c
    };

    render();
  }
}

initBoard();

</script>

</body>
</html>
