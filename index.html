<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Russian Checkers</title>

<style>

body{
  margin:0;
  background:#08203a;
  font-family:Arial;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h1{
  margin-top:20px;
}

#status{
  margin:15px;
  font-size:22px;
}

#board{
  display:grid;
  grid-template-columns:repeat(8,80px);
  grid-template-rows:repeat(8,80px);
  border:8px solid #5c3415;
}

.cell{
  width:80px;
  height:80px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.light{
  background:#e6cf9f;
}

.dark{
  background:#5a3415;
}

.piece{
  width:62px;
  height:62px;
  border-radius:50%;
  cursor:pointer;
}

.white{
  background:#f7f2df;
  border:3px solid #c7b28a;
}

.black{
  background:#1c120b;
  border:3px solid #5a3a20;
}

.selected{
  box-shadow:inset 0 0 0 5px gold;
}

.valid::after{
  content:"";
  width:18px;
  height:18px;
  border-radius:50%;
  background:#5ec9ff;
  position:absolute;
}

.king::before{
  content:"♛";
  color:gold;
  font-size:30px;
  position:absolute;
}

</style>
</head>

<body>

<h1>RUSSIAN CHECKERS</h1>

<div id="status">White Turn</div>

<div id="board"></div>

<script>

let board = [];

let selected = null;

let turn = "white";

let forcedPiece = null;

function createBoard(){

  board = Array(8)
    .fill()
    .map(()=>Array(8).fill(null));

  // black pieces

  for(let r=0;r<3;r++){

    for(let c=0;c<8;c++){

      if((r+c)%2===1){

        board[r][c] = {
          color:"black",
          king:false
        };
      }
    }
  }

  // white pieces

  for(let r=5;r<8;r++){

    for(let c=0;c<8;c++){

      if((r+c)%2===1){

        board[r][c] = {
          color:"white",
          king:false
        };
      }
    }
  }

  render();
}

function render(){

  const boardEl =
    document.getElementById("board");

  boardEl.innerHTML = "";

  let validMoves = [];

  if(selected){

    validMoves =
      getMoves(
        selected.r,
        selected.c
      );
  }

  for(let r=0;r<8;r++){

    for(let c=0;c<8;c++){

      const cell =
        document.createElement("div");

      cell.className =
        "cell " +
        (((r+c)%2===0)
          ? "light"
          : "dark");

      if(
        selected &&
        selected.r===r &&
        selected.c===c
      ){
        cell.classList.add("selected");
      }

      if(
        validMoves.some(
          m=>m.r===r && m.c===c
        )
      ){
        cell.classList.add("valid");
      }

      cell.onclick = ()=>clickCell(r,c);

      const piece = board[r][c];

      if(piece){

        const pieceEl =
          document.createElement("div");

        pieceEl.className =
          "piece " +
          piece.color;

        if(piece.king){

          pieceEl.classList.add("king");
        }

        cell.appendChild(pieceEl);
      }

      boardEl.appendChild(cell);
    }
  }
}

function inside(r,c){

  return (
    r>=0 &&
    r<8 &&
    c>=0 &&
    c<8
  );
}

function getCaptures(r,c){

  const piece = board[r][c];

  if(!piece) return [];

  const dirs = [
    [1,1],
    [1,-1],
    [-1,1],
    [-1,-1]
  ];

  const captures = [];

  for(const [dr,dc] of dirs){

    const mr = r + dr;
    const mc = c + dc;

    const jr = r + dr*2;
    const jc = c + dc*2;

    if(
      inside(jr,jc) &&
      board[mr][mc] &&
      board[mr][mc].color !== piece.color &&
      !board[jr][jc]
    ){

      captures.push({
        r:jr,
        c:jc,
        jr:mr,
        jc:mc
      });
    }
  }

  return captures;
}

function hasCapture(color){

  for(let r=0;r<8;r++){

    for(let c=0;c<8;c++){

      const piece = board[r][c];

      if(
        piece &&
        piece.color===color &&
        getCaptures(r,c).length>0
      ){

        return true;
      }
    }
  }

  return false;
}

function getMoves(r,c){

  const piece = board[r][c];

  if(!piece) return [];

  const captures =
    getCaptures(r,c);

  // forced capture rule

  if(hasCapture(piece.color)){

    return captures;
  }

  const moves = [];

  let dirs = [];

  if(piece.king){

    dirs = [
      [1,1],
      [1,-1],
      [-1,1],
      [-1,-1]
    ];

  }else{

    dirs =
      piece.color==="white"
      ? [[-1,-1],[-1,1]]
      : [[1,-1],[1,1]];
  }

  for(const [dr,dc] of dirs){

    const nr = r + dr;
    const nc = c + dc;

    if(
      inside(nr,nc) &&
      !board[nr][nc]
    ){

      moves.push({
        r:nr,
        c:nc
      });
    }
  }

  return moves;
}

function movePiece(fr,fc,tr,tc){

  const move =
    getMoves(fr,fc)
      .find(
        m=>m.r===tr && m.c===tc
      );

  if(!move) return;

  const piece = board[fr][fc];

  board[tr][tc] = piece;

  board[fr][fc] = null;

  let captured = false;

  // remove captured piece

  if(move.jr!==undefined){

    board[move.jr][move.jc] = null;

    captured = true;
  }

  // king promotion

  if(
    piece.color==="white" &&
    tr===0
  ){
    piece.king = true;
  }

  if(
    piece.color==="black" &&
    tr===7
  ){
    piece.king = true;
  }

  // MULTI CAPTURE

  if(captured){

    const more =
      getCaptures(tr,tc);

    if(more.length>0){

      selected = {
        r:tr,
        c:tc
      };

      forcedPiece = {
        r:tr,
        c:tc
      };

      render();

      return;
    }
  }

  selected = null;

  forcedPiece = null;

  turn =
    turn==="white"
    ? "black"
    : "white";

  document.getElementById(
    "status"
  ).textContent =
    turn.charAt(0).toUpperCase()
    + turn.slice(1)
    + " Turn";

  render();
}

function clickCell(r,c){

  const piece = board[r][c];

  // move selected piece

  if(selected){

    const moves =
      getMoves(
        selected.r,
        selected.c
      );

    const valid =
      moves.find(
        m=>m.r===r && m.c===c
      );

    if(valid){

      movePiece(
        selected.r,
        selected.c,
        r,
        c
      );

      return;
    }
  }

  // forced multi capture

  if(forcedPiece){

    if(
      r!==forcedPiece.r ||
      c!==forcedPiece.c
    ){
      return;
    }
  }

  // select piece

  if(
    piece &&
    piece.color===turn
  ){

    // must capture rule

    if(
      hasCapture(turn) &&
      getCaptures(r,c).length===0
    ){
      return;
    }

    selected = {r,c};

    render();
  }
}

createBoard();

</script>

</body>
</html>
